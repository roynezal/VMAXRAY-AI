<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VMAXRAY — Server Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050a0f;
      --bg2: #080f17;
      --panel: #0b1520;
      --border: #0e2235;
      --green: #00ff88;
      --green-dim: #00ff8844;
      --amber: #ffaa00;
      --amber-dim: #ffaa0033;
      --red: #ff3355;
      --red-dim: #ff335533;
      --cyan: #00d4ff;
      --cyan-dim: #00d4ff22;
      --text: #c8dde8;
      --text-dim: #4a6b7a;
      --mono: 'Share Tech Mono', monospace;
      --display: 'Orbitron', monospace;
      --body: 'Rajdhani', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--body);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* Radial glow center */
    body::after {
      content: '';
      position: fixed;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 80vw;
      height: 60vh;
      background: radial-gradient(ellipse, rgba(0,212,255,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    /* Header */
    header {
      text-align: center;
      margin-bottom: 60px;
      animation: fadeDown 0.8s ease forwards;
    }

    .logo-wrap {
      display: inline-block;
      position: relative;
      margin-bottom: 12px;
    }

    .logo {
      font-family: var(--display);
      font-size: clamp(2.4rem, 8vw, 4.2rem);
      font-weight: 900;
      letter-spacing: 0.15em;
      color: var(--cyan);
      text-shadow:
        0 0 20px rgba(0,212,255,0.8),
        0 0 60px rgba(0,212,255,0.3);
      line-height: 1;
    }

    .logo span {
      color: var(--green);
      text-shadow:
        0 0 20px rgba(0,255,136,0.8),
        0 0 60px rgba(0,255,136,0.3);
    }

    .logo-bar {
      display: block;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--cyan), var(--green), transparent);
      margin: 8px 0;
      animation: scanline 3s ease-in-out infinite;
    }

    .tagline {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--text-dim);
      letter-spacing: 0.3em;
      text-transform: uppercase;
    }

    .tagline em {
      color: var(--amber);
      font-style: normal;
    }

    /* Status bar */
    .status-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin-bottom: 50px;
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--text-dim);
      animation: fadeIn 1s 0.3s ease forwards;
      opacity: 0;
    }

    .status-bar .divider { color: var(--border); }

    .relay-status {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .relay-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--amber);
      box-shadow: 0 0 6px var(--amber);
      animation: pulse-amber 2s infinite;
    }

    .relay-dot.live {
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: pulse-green 2s infinite;
    }

    /* Server cards */
    .servers {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 40px;
    }

    @media (max-width: 600px) {
      .servers { grid-template-columns: 1fr; }
    }

    .server-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 28px 24px;
      position: relative;
      overflow: hidden;
      opacity: 0;
      transform: translateY(20px);
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .server-card.loaded {
      animation: fadeUp 0.5s ease forwards;
    }

    .server-card:hover {
      border-color: var(--cyan);
      box-shadow: 0 0 30px rgba(0,212,255,0.08), inset 0 0 30px rgba(0,212,255,0.03);
    }

    /* Corner accent */
    .server-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 40px; height: 40px;
      border-top: 2px solid var(--cyan);
      border-left: 2px solid var(--cyan);
      opacity: 0.5;
    }

    .server-card::after {
      content: '';
      position: absolute;
      bottom: 0; right: 0;
      width: 40px; height: 40px;
      border-bottom: 2px solid var(--cyan);
      border-right: 2px solid var(--cyan);
      opacity: 0.5;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 20px;
    }

    .machine-id {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--text-dim);
      letter-spacing: 0.2em;
      margin-bottom: 4px;
    }

    .machine-name {
      font-family: var(--display);
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--cyan);
      letter-spacing: 0.1em;
    }

    /* Status badge */
    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 2px;
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      font-weight: bold;
      border: 1px solid;
      white-space: nowrap;
    }

    .status-badge.checking {
      color: var(--amber);
      border-color: var(--amber-dim);
      background: var(--amber-dim);
    }

    .status-badge.online {
      color: var(--green);
      border-color: var(--green-dim);
      background: var(--green-dim);
    }

    .status-badge.offline {
      color: var(--red);
      border-color: var(--red-dim);
      background: var(--red-dim);
    }

    .status-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: currentColor;
    }

    .status-badge.online .status-dot {
      animation: pulse-green 1.5s infinite;
    }

    .status-badge.checking .status-dot {
      animation: pulse-amber 1s infinite;
    }

    /* Info rows */
    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.82rem;
    }

    .info-row:last-of-type { border-bottom: none; }

    .info-label {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--text-dim);
      letter-spacing: 0.1em;
    }

    .info-value {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--text);
    }

    .info-value.url-val {
      color: var(--cyan);
      font-size: 0.62rem;
      max-width: 160px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .info-value.na { color: var(--text-dim); font-style: italic; }

    /* Launch button */
    .launch-btn {
      display: block;
      width: 100%;
      margin-top: 22px;
      padding: 12px;
      background: transparent;
      border: 1px solid var(--cyan);
      color: var(--cyan);
      font-family: var(--display);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      position: relative;
      overflow: hidden;
      transition: color 0.2s, background 0.2s;
    }

    .launch-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--cyan);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.25s ease;
      z-index: 0;
    }

    .launch-btn:hover::before { transform: scaleX(1); }
    .launch-btn:hover { color: var(--bg); }
    .launch-btn span { position: relative; z-index: 1; }

    .launch-btn.disabled {
      border-color: var(--border);
      color: var(--text-dim);
      cursor: not-allowed;
      pointer-events: none;
    }

    /* Refresh button */
    .refresh-wrap {
      text-align: center;
      margin-bottom: 30px;
      animation: fadeIn 1s 0.6s ease forwards;
      opacity: 0;
    }

    .refresh-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: var(--mono);
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      padding: 8px 20px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .refresh-btn:hover {
      border-color: var(--cyan);
      color: var(--cyan);
    }

    .refresh-btn.spinning { animation: spin 0.6s linear infinite; }

    /* Footer */
    footer {
      text-align: center;
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--text-dim);
      letter-spacing: 0.15em;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      animation: fadeIn 1s 0.8s ease forwards;
      opacity: 0;
    }

    footer span { color: var(--cyan); }

    /* Scan line effect */
    .scanline {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(0,212,255,0.15), transparent);
      animation: scanDown 8s linear infinite;
      pointer-events: none;
      z-index: 100;
    }

    /* Animations */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    @keyframes pulse-green {
      0%, 100% { box-shadow: 0 0 4px var(--green); opacity: 1; }
      50% { box-shadow: 0 0 10px var(--green); opacity: 0.6; }
    }

    @keyframes pulse-amber {
      0%, 100% { box-shadow: 0 0 4px var(--amber); opacity: 1; }
      50% { box-shadow: 0 0 10px var(--amber); opacity: 0.6; }
    }

    @keyframes scanline {
      0%, 100% { opacity: 0.3; transform: scaleX(0.8); }
      50% { opacity: 1; transform: scaleX(1); }
    }

    @keyframes scanDown {
      from { top: -2px; }
      to { top: 100vh; }
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="scanline"></div>

  <div class="container">
    <header>
      <div class="logo-wrap">
        <div class="logo">VMAX<span>RAY</span></div>
        <span class="logo-bar"></span>
      </div>
      <div class="tagline">AI TRADING SYSTEM &nbsp;|&nbsp; SERVER HUB &nbsp;|&nbsp; <em>LIVE</em></div>
    </header>

    <div class="status-bar">
      <div class="relay-status">
        <div class="relay-dot" id="relay-dot"></div>
        <span id="relay-label">GAS RELAY — CHECKING</span>
      </div>
      <span class="divider">|</span>
      <span id="last-updated">UPDATED: --:--:--</span>
      <span class="divider">|</span>
      <span id="sgtime">SGT --:--</span>
    </div>

    <div class="servers" id="servers-grid">
      <!-- Cards injected by JS -->
    </div>

    <div class="refresh-wrap">
      <button class="refresh-btn" id="refresh-btn" onclick="loadAll()">⟳ &nbsp;REFRESH STATUS</button>
    </div>

    <footer>
      VMAXRAY &nbsp;<span>©2026</span>&nbsp; · BUILT BY ROY · SINGAPORE
    </footer>
  </div>

  <script>
    // ── CONFIG ─────────────────────────────────────────
     const GAS_URL = "https://script.google.com/macros/s/AKfycbwTvs_1_4ZjDi7HSrpScpgHOGWeMsba0_Ia17skX6vUKCfeU-UlEz2h2wpNf7p2Prm5Fw/exec";

    const MACHINES = [
      {
        id: "NODE-01",
        key: "win7",
        name: "WIN7",
        desc: "Primary Chat Server",
        port: "8080"
      },
      {
        id: "NODE-02",
        key: "minios",
        name: "MINIOS",
        desc: "Secondary Chat Server",
        port: "8081"
      }
    ];
    // ───────────────────────────────────────────────────

    let liveURLs = { win7: null, minios: null };

    function getSGT() {
      return new Date().toLocaleTimeString("en-SG", {
        timeZone: "Asia/Singapore",
        hour: "2-digit", minute: "2-digit", second: "2-digit",
        hour12: false
      });
    }

    function updateClock() {
      document.getElementById("sgtime").textContent = "SGT " + getSGT();
    }

    function buildCards() {
      const grid = document.getElementById("servers-grid");
      grid.innerHTML = "";

      MACHINES.forEach((m, i) => {
        const card = document.createElement("div");
        card.className = "server-card";
        card.id = "card-" + m.key;
        card.innerHTML = `
          <div class="card-header">
            <div>
              <div class="machine-id">${m.id} · ${m.desc}</div>
              <div class="machine-name">${m.name}</div>
            </div>
            <div class="status-badge checking" id="badge-${m.key}">
              <div class="status-dot"></div>
              <span>CHECKING</span>
            </div>
          </div>

          <div class="info-row">
            <span class="info-label">TUNNEL URL</span>
            <span class="info-value url-val" id="url-${m.key}">—</span>
          </div>
          <div class="info-row">
            <span class="info-label">PORT</span>
            <span class="info-value">${m.port}</span>
          </div>
          <div class="info-row">
            <span class="info-label">PING</span>
            <span class="info-value" id="ping-${m.key}">—</span>
          </div>
          <div class="info-row">
            <span class="info-label">LAST SEEN</span>
            <span class="info-value" id="seen-${m.key}">—</span>
          </div>

          <a href="#" id="btn-${m.key}" class="launch-btn disabled" target="_blank">
            <span>⬡ &nbsp;CONNECT TO ${m.name}</span>
          </a>
        `;
        grid.appendChild(card);

        // Stagger animation
        setTimeout(() => card.classList.add("loaded"), i * 150);
      });
    }

    function setStatus(key, state, url) {
      const badge = document.getElementById("badge-" + key);
      const btn = document.getElementById("btn-" + key);
      const urlEl = document.getElementById("url-" + key);

      badge.className = "status-badge " + state;
      badge.innerHTML = `<div class="status-dot"></div><span>${state.toUpperCase()}</span>`;

      if (url) {
        urlEl.textContent = url.replace("https://", "");
        urlEl.title = url;
      } else {
        urlEl.textContent = "—";
      }

      if (state === "online" && url) {
        btn.href = url;
        btn.classList.remove("disabled");
      } else {
        btn.href = "#";
        btn.classList.add("disabled");
      }
    }

    function setPing(key, ms) {
      const el = document.getElementById("ping-" + key);
      if (ms !== null) {
        const color = ms < 300 ? "var(--green)" : ms < 800 ? "var(--amber)" : "var(--red)";
        el.innerHTML = `<span style="color:${color}">${ms}ms</span>`;
      } else {
        el.innerHTML = `<span style="color:var(--red)">TIMEOUT</span>`;
      }
    }

    function setSeen(key) {
      const el = document.getElementById("seen-" + key);
      el.textContent = getSGT();
    }

    async function pingServer(url) {
      const start = Date.now();
      try {
        const res = await fetch(url, {
          method: "GET",
          mode: "no-cors",
          signal: AbortSignal.timeout(4000)
        });
        return Date.now() - start;
      } catch {
        return null;
      }
    }

    async function fetchURLsFromGAS() {
      try {
        const res = await fetch(`${GAS_URL}?action=getURLs`, {
          signal: AbortSignal.timeout(8000)
        });
        const data = await res.json();
        return data;
      } catch (e) {
        return null;
      }
    }

    async function loadAll() {
      const btn = document.getElementById("refresh-btn");
      const relayDot = document.getElementById("relay-dot");
      const relayLabel = document.getElementById("relay-label");

      btn.classList.add("spinning");
      relayDot.className = "relay-dot";
      relayLabel.textContent = "GAS RELAY — CONNECTING";

      // Fetch URLs from GAS
      const urls = await fetchURLsFromGAS();

      if (!urls) {
        relayLabel.textContent = "GAS RELAY — UNREACHABLE";
        MACHINES.forEach(m => setStatus(m.key, "offline", null));
        btn.classList.remove("spinning");
        return;
      }

      relayDot.className = "relay-dot live";
      relayLabel.textContent = "GAS RELAY — ONLINE";
      liveURLs = urls;

      document.getElementById("last-updated").textContent =
        "UPDATED: " + getSGT();

      // Ping each server
      const checks = MACHINES.map(async (m) => {
        const url = urls[m.key];
        if (!url) {
          setStatus(m.key, "offline", null);
          setPing(m.key, null);
          return;
        }

        setStatus(m.key, "checking", url);
        const ms = await pingServer(url);

        if (ms !== null) {
          setStatus(m.key, "online", url);
          setPing(m.key, ms);
          setSeen(m.key);
        } else {
          setStatus(m.key, "offline", url);
          setPing(m.key, null);
        }
      });

      await Promise.all(checks);
      btn.classList.remove("spinning");
    }

    // Init
    buildCards();
    setInterval(updateClock, 1000);
    updateClock();
    loadAll();

    // Auto-refresh every 60s
    setInterval(loadAll, 60000);
  </script>
</body>
</html>
